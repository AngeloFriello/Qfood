name: dashboard
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.6.0


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flex_color_scheme: ^8.3.1
  provider: ^6.1.2

  hive_ce: ^2.11.2
  path_provider: ^2.1.5
  flex_color_picker: ^3.7.1
  url_launcher: ^6.3.1

  auto_route: ^10.3.0
  get_it: ^8.0.3
  syncfusion_flutter_charts: ^29.2.11
  data_table_2: ^2.6.0
  file_picker: ^10.2.0
  dotted_border: ^3.0.1
  syncfusion_flutter_calendar: ^29.2.11+1
  archive: ^4.0.7
  google_fonts: ^6.3.2
  intl: ^0.20.2
  toastification: ^3.0.3
  desktop_drop: ^0.6.0
  mask_text_input_formatter: ^2.9.0
  flutter_svg: ^2.2.0
  pdf: ^3.11.3
  printing: ^5.14.2
  excel: ^4.0.6
  file_saver: ^0.3.1
  easy_localization: ^3.0.8
  country_flags: ^3.3.0
  countries_world_map: ^1.3.0
  badges: ^3.1.2
  change_case: ^2.2.0
  percent_indicator: ^4.2.5
  qr_flutter: ^4.1.0
  unique_identifier: ^0.4.0
  device_info_plus: ^12.2.0
  sqflite: ^2.4.2
  lucide_icons: ^0.257.0
  http: ^1.2.2
  shared_preferences: ^2.3.2
  sqflite_common_ffi: ^2.3.3
  package_info_plus: ^8.0.0
  uuid: ^4.0.0
  unique_device_identifier: ^1.0.0
  flutter_launcher_icons: ^0.14.4
  path: ^1.9.0
  internet_connection_checker_plus: ^2.9.1+2
  flutter_esc_pos_utils: ^1.0.1
  share_plus: ^12.0.1
  flutter_slidable: ^4.0.3
  window_manager: ^0.3.9
  flutter_esc_pos_network: ^1.0.0
  socket_io_client: ^3.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  auto_route_generator: ^10.1.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  
  # Windows (QFood cassa)
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 256
  
  # Android adaptive icon
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21

  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  custom_lint: ^0.7.5

dependency_overrides:
  archive: ^3.4.9

flutter:

  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logoback.png
    - assets/logodark.png
    - assets/logosuverde.png
    - assets/images/thump/
    - assets/svgs/
    - assets/translations/
    # Google fonts, font assets
    - assets/google_fonts/



  fonts:
    - family: FlexIcons
      fonts:
        - asset: assets/fonts/FlexIcons.ttf
    - family: NotoSans    
      fonts:
        - asset: assets/google_fonts/NotoSans-Bold.ttf
        - asset: assets/google_fonts/NotoSans-Medium.ttf
        - asset: assets/google_fonts/NotoSans-Regular.ttf
    - family: FiraMono
      fonts:
        - asset: assets/google_fonts/FiraMono-Regular.ttf  


  
